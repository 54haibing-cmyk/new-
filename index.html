<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>炫彩水果消消乐</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    user-select:none;
}

body{
    background:
    radial-gradient(circle at top,#2b1055,#12002f 70%);
    min-height:100vh;
    overflow:hidden;
    font-family:"Arial";
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* 星空 */
.stars{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.2;}
    to{opacity:1;}
}

.game{
    position:relative;
    z-index:2;
    width:95vw;
    max-width:520px;
    padding:15px;
    border-radius:25px;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.08);
    border:2px solid rgba(255,255,255,0.15);
    box-shadow:0 0 35px rgba(255,255,255,0.15);
}

.title{
    text-align:center;
    font-size:34px;
    margin-bottom:10px;
    font-weight:bold;
    text-shadow:0 0 10px #ff89ff;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    font-size:18px;
}

.board{
    display:grid;
    grid-template-columns:repeat(8,1fr);
    gap:6px;
}

.cell{
    aspect-ratio:1;
    border-radius:18px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:34px;
    cursor:pointer;
    transition:0.18s;
    background:rgba(255,255,255,0.08);
    box-shadow:
        inset 0 2px 5px rgba(255,255,255,0.2),
        0 3px 10px rgba(0,0,0,0.3);
}

.cell:active{
    transform:scale(0.9);
}

.selected{
    transform:scale(1.15);
    box-shadow:
    0 0 20px #fff,
    0 0 35px #ff77ff;
}

.controls{
    margin-top:15px;
    text-align:center;
}

button{
    border:none;
    padding:12px 24px;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(45deg,#ff4fd8,#ff7b00);
    box-shadow:0 0 18px rgba(255,120,255,0.6);
}

.combo{
    text-align:center;
    margin-top:10px;
    color:#ffe66d;
    font-size:20px;
    height:24px;
}

@media(max-width:600px){
    .cell{
        font-size:28px;
    }
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="game">

    <div class="title">🍓 炫彩消消乐 🍇</div>

    <div class="topbar">
        <div>⭐ 分数：<span id="score">0</span></div>
        <div>🔥 连击：<span id="comboNum">0</span></div>
    </div>

    <div class="board" id="board"></div>

    <div class="combo" id="comboText"></div>

    <div class="controls">
        <button onclick="restartGame()">重新开始</button>
    </div>

</div>

<script>

/* 星空 */
const stars = document.getElementById("stars");

for(let i=0;i<120;i++){
    const s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDelay=Math.random()*2+"s";
    stars.appendChild(s);
}

/* 音效 */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq,duration){
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.frequency.value=freq;
    osc.type="triangle";

    gain.gain.value=0.05;

    osc.start();

    setTimeout(()=>{
        osc.stop();
    },duration);
}

/* 游戏 */
const board=document.getElementById("board");

const fruits=["🍎","🍇","🍓","🍊","🥝","🍋"];

let grid=[];
let selected=null;

let score=0;
let combo=0;

const rows=8;
const cols=8;

function randomFruit(){
    return fruits[Math.floor(Math.random()*fruits.length)];
}

function createBoard(){

    grid=[];

    for(let r=0;r<rows;r++){
        let row=[];

        for(let c=0;c<cols;c++){
            row.push(randomFruit());
        }

        grid.push(row);
    }

    renderBoard();

    setTimeout(()=>{
        autoClear();
    },100);
}

function renderBoard(){

    board.innerHTML="";

    for(let r=0;r<rows;r++){

        for(let c=0;c<cols;c++){

            const cell=document.createElement("div");

            cell.className="cell";

            if(selected && selected.r===r && selected.c===c){
                cell.classList.add("selected");
            }

            cell.innerHTML=grid[r][c];

            cell.onclick=()=>clickCell(r,c);

            board.appendChild(cell);
        }
    }
}

function clickCell(r,c){

    if(!selected){

        selected={r,c};

        renderBoard();

        return;
    }

    const r2=selected.r;
    const c2=selected.c;

    if(
        (Math.abs(r-r2)===1 && c===c2) ||
        (Math.abs(c-c2)===1 && r===r2)
    ){

        swap(r,c,r2,c2);

        if(checkMatches().length>0){

            combo++;

            document.getElementById("comboNum").innerText=combo;

            clearLoop();

            beep(600,100);

        }else{

            swap(r,c,r2,c2);

            combo=0;

            document.getElementById("comboNum").innerText=combo;

            beep(200,150);
        }
    }

    selected=null;

    renderBoard();
}

function swap(r1,c1,r2,c2){

    let temp=grid[r1][c1];

    grid[r1][c1]=grid[r2][c2];

    grid[r2][c2]=temp;
}

function checkMatches(){

    let matches=[];

    /* 横向 */
    for(let r=0;r<rows;r++){

        let count=1;

        for(let c=1;c<cols;c++){

            if(grid[r][c]===grid[r][c-1]){

                count++;

            }else{

                if(count>=3){

                    for(let k=0;k<count;k++){
                        matches.push([r,c-1-k]);
                    }
                }

                count=1;
            }
        }

        if(count>=3){

            for(let k=0;k<count;k++){
                matches.push([r,cols-1-k]);
            }
        }
    }

    /* 纵向 */
    for(let c=0;c<cols;c++){

        let count=1;

        for(let r=1;r<rows;r++){

            if(grid[r][c]===grid[r-1][c]){

                count++;

            }else{

                if(count>=3){

                    for(let k=0;k<count;k++){
                        matches.push([r-1-k,c]);
                    }
                }

                count=1;
            }
        }

        if(count>=3){

            for(let k=0;k<count;k++){
                matches.push([rows-1-k,c]);
            }
        }
    }

    return matches;
}

function clearLoop(){

    let matches=checkMatches();

    if(matches.length===0){

        renderBoard();

        return;
    }

    document.getElementById("comboText").innerHTML=
    "✨ 连消 +" + matches.length;

    score+=matches.length*10*combo;

    document.getElementById("score").innerText=score;

    matches.forEach(([r,c])=>{
        grid[r][c]=null;
    });

    renderBoard();

    setTimeout(()=>{

        dropFruits();

        fillFruits();

        renderBoard();

        beep(900,120);

        setTimeout(clearLoop,200);

    },180);
}

function dropFruits(){

    for(let c=0;c<cols;c++){

        for(let r=rows-1;r>=0;r--){

            if(grid[r][c]===null){

                for(let k=r-1;k>=0;k--){

                    if(grid[k][c]!==null){

                        grid[r][c]=grid[k][c];

                        grid[k][c]=null;

                        break;
                    }
                }
            }
        }
    }
}

function fillFruits(){

    for(let r=0;r<rows;r++){

        for(let c=0;c<cols;c++){

            if(grid[r][c]===null){

                grid[r][c]=randomFruit();
            }
        }
    }
}

function autoClear(){

    if(checkMatches().length>0){

        clearLoop();

    }else{

        renderBoard();
    }
}

function restartGame(){

    score=0;
    combo=0;

    document.getElementById("score").innerText=0;
    document.getElementById("comboNum").innerText=0;
    document.getElementById("comboText").innerHTML="";

    selected=null;

    createBoard();
}

createBoard();

</script>

</body>
</html>
